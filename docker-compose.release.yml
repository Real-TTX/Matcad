name: matcad

# Builds the release images LOCALLY (release version, ports 80/443).
# For normal deployment use docker-compose.yml (pulls prebuilt images from GHCR);
# CI publishes those images on a version tag. Use this file only to build/test
# the release images on your own machine.

services:
  matcad:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${MATCAD_VERSION:-0.0.0}
        CADDY_DNS_MODULES: ${CADDY_DNS_MODULES:-github.com/caddy-dns/netcup}
    image: matcad:${MATCAD_VERSION:-latest}
    depends_on:
      - caddy
    ports:
      - "4433:4433"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Matcad__DataDir=/data
      - Matcad__ConfigDir=/data/config
      - Matcad__CaddyLogDir=/caddy-logs
      - Matcad__Caddy__AdminUrl=http://caddy:2019
    volumes:
      - matcad-data:/data
      - caddy-logs:/caddy-logs
      # Read-only socket for the optional Docker discovery mode.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
      args:
        CADDY_DNS_MODULES: ${CADDY_DNS_MODULES:-github.com/caddy-dns/netcup}
    image: matcad-caddy:${MATCAD_VERSION:-latest}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    # Admin API is intentionally NOT published to the host in release;
    # it is only reachable inside the docker network by the matcad service.
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/caddy-logs
    restart: unless-stopped

volumes:
  matcad-data:
  caddy-data:
  caddy-config:
  caddy-logs:
