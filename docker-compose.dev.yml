name: matcad-dev

services:
  matcad:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${MATCAD_VERSION:-local}
    image: matcad:dev
    depends_on:
      - caddy
    ports:
      - "4433:4433"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Matcad__DataDir=/data
      - Matcad__ConfigDir=/data/config
      - Matcad__CaddyLogDir=/caddy-logs
      - Matcad__Caddy__AdminUrl=http://caddy:2019
    volumes:
      - matcad-data:/data
      - caddy-logs:/caddy-logs
      # Read-only socket for the Docker discovery mode.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    image: matcad-caddy:dev
    ports:
      - "8080:80"
      - "8443:443"
      - "2019:2019" # admin API exposed in dev for debugging only
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/caddy-logs
    restart: unless-stopped

  # Test upstream so routes have something to proxy to during development.
  # Labeled so the Docker discovery mode has something to find.
  whoami:
    image: traefik/whoami
    labels:
      matcad.enable: "true"
      matcad.port: "80"
    restart: unless-stopped

volumes:
  matcad-data:
  caddy-data:
  caddy-config:
  caddy-logs:
