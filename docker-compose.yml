name: matcad

# Matcad — homelab / production stack. Pulls prebuilt images from GHCR (no build).
#   docker compose up -d                       # start / update
#   MATCAD_VERSION=0.2.0 docker compose up -d   # pin a version instead of latest

services:
  caddy:
    image: ghcr.io/real-ttx/matcad-caddy:${MATCAD_VERSION:-latest}
    pull_policy: always      # always fetch the newest image on `up`
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"           # HTTP/3
    volumes:
      - caddy-data:/data         # TLS certificates
      - caddy-logs:/caddy-logs   # access logs (shared with Matcad)

  matcad:
    image: ghcr.io/real-ttx/matcad:${MATCAD_VERSION:-latest}
    pull_policy: always      # always fetch the newest image on `up`
    restart: unless-stopped
    depends_on:
      - caddy
    ports:
      - "4433:4433"             # UI — put it behind Caddy or your VPN
    volumes:
      - matcad-data:/data        # SQLite + JSON config + keys
      - caddy-logs:/caddy-logs
      - /var/run/docker.sock:/var/run/docker.sock:ro   # optional: Docker discovery

volumes:
  matcad-data:
  caddy-data:
  caddy-logs:
